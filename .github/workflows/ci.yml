name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Rust Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: engine
        run: cargo test
      - name: Check formatting
        working-directory: engine
        run: cargo fmt --check
      - name: Clippy
        working-directory: engine
        run: cargo clippy -- -D warnings
      - name: PDF size regression check
        run: bash .github/scripts/check-pdf-size.sh

  packages:
    name: TypeScript Packages
    runs-on: ubuntu-latest
    needs: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install dependencies
        run: npm install
      - name: Build Shared package
        working-directory: packages/shared
        run: npm run build
      - name: Build React package
        working-directory: packages/react
        run: npm run build
      - name: Build Templates
        working-directory: packages/templates
        run: npm run build
      - name: Build Core (WASM + TS)
        working-directory: packages/core
        run: npm run build
      - name: Assert Core tarball layout
        # Belt-and-braces against the 0.10.0 publish miss: pack the
        # package and verify every entry-point file is present. Catches
        # stray `.gitignore`s inside wasm-pack output dirs (which silently
        # drop their contents at publish time) and any future build
        # script that forgets to emit a required entry.
        working-directory: packages/core
        run: bash ./scripts/assert-tarball.sh
      - name: Build Renderer
        working-directory: packages/renderer
        run: npm run build
      - name: Build CLI
        working-directory: packages/cli
        run: npm run build
      - name: Test React
        working-directory: packages/react
        run: npm test
      - name: Test Core
        working-directory: packages/core
        run: npm test
      - name: Test Core (workerd)
        # Runs vitest inside Cloudflare's workerd via
        # @cloudflare/vitest-pool-workers. Catches Workers-only
        # regressions like the 0.10.0 `wasm.__wbindgen_start` crash
        # that Node-based unit tests can't see because workerd has
        # different WASM-as-ESM semantics.
        working-directory: packages/core
        run: npm run test:workers
      - name: Test Renderer
        working-directory: packages/renderer
        run: npm test
      - name: Test CLI
        working-directory: packages/cli
        run: npm test
      - name: Test Hono
        working-directory: packages/hono
        run: npm test
      - name: Test Next
        working-directory: packages/next
        run: npm test
      - name: Test Resend
        working-directory: packages/resend
        run: npm test
      - name: Test MCP
        working-directory: packages/mcp
        run: npm test
      - name: Test VS Code Extension
        working-directory: packages/vscode
        run: npm test
